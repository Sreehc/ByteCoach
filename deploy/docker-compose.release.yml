services:
  redis:
    image: redis/redis-stack-server:latest
    container_name: bytecoach-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command:
      - /bin/sh
      - -lc
      - |
        if [ -n "${BYTECOACH_REDIS_PASSWORD:-}" ]; then
          exec redis-server \
            --appendonly yes \
            --requirepass "${BYTECOACH_REDIS_PASSWORD}" \
            --loadmodule /opt/redis-stack/lib/redisearch.so \
            --loadmodule /opt/redis-stack/lib/rejson.so
        else
          exec redis-server \
            --appendonly yes \
            --loadmodule /opt/redis-stack/lib/redisearch.so \
            --loadmodule /opt/redis-stack/lib/rejson.so
        fi
    healthcheck:
      test:
        - CMD-SHELL
        - if [ -n "$BYTECOACH_REDIS_PASSWORD" ]; then redis-cli -a "$BYTECOACH_REDIS_PASSWORD" ping; else redis-cli ping; fi
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:${BYTECOACH_REDIS_PORT:-6380}:6379"
    networks:
      - bytecoach

  backend:
    image: ${BYTECOACH_BACKEND_IMAGE:-ghcr.io/sreehc/bytecoach-backend:latest}
    container_name: bytecoach-backend
    restart: unless-stopped
    network_mode: host
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      BYTECOACH_DB_HOST: ${BYTECOACH_DB_HOST:-127.0.0.1}
      BYTECOACH_DB_PORT: ${BYTECOACH_DB_PORT:-3306}
      BYTECOACH_DB_NAME: ${BYTECOACH_DB_NAME:-bytecoach}
      BYTECOACH_DB_USERNAME: ${BYTECOACH_DB_USERNAME:-bytecoach}
      BYTECOACH_DB_PASSWORD: ${BYTECOACH_DB_PASSWORD:?Set BYTECOACH_DB_PASSWORD}
      BYTECOACH_REDIS_HOST: ${BYTECOACH_REDIS_HOST:-127.0.0.1}
      BYTECOACH_REDIS_PORT: ${BYTECOACH_REDIS_PORT:-6380}
      BYTECOACH_REDIS_PASSWORD: ${BYTECOACH_REDIS_PASSWORD:-}
      BYTECOACH_JWT_SECRET: ${BYTECOACH_JWT_SECRET:?Set BYTECOACH_JWT_SECRET}
      BYTECOACH_CORS_ORIGINS: ${BYTECOACH_CORS_ORIGINS:-http://localhost}
      BYTECOACH_LLM_ENABLED: ${BYTECOACH_LLM_ENABLED:-true}
      BYTECOACH_LLM_BASE_URL: ${BYTECOACH_LLM_BASE_URL:-https://api.openai.com/v1}
      BYTECOACH_LLM_API_KEY: ${BYTECOACH_LLM_API_KEY:-}
      BYTECOACH_LLM_MODEL: ${BYTECOACH_LLM_MODEL:-gpt-4.1-mini}
      BYTECOACH_EMBEDDING_ENABLED: ${BYTECOACH_EMBEDDING_ENABLED:-false}
      BYTECOACH_EMBEDDING_BASE_URL: ${BYTECOACH_EMBEDDING_BASE_URL:-${BYTECOACH_LLM_BASE_URL:-https://api.openai.com/v1}}
      BYTECOACH_EMBEDDING_API_KEY: ${BYTECOACH_EMBEDDING_API_KEY:-${BYTECOACH_LLM_API_KEY:-}}
      BYTECOACH_EMBEDDING_MODEL: ${BYTECOACH_EMBEDDING_MODEL:-text-embedding-3-small}
      BYTECOACH_EMBEDDING_DIMENSIONS: ${BYTECOACH_EMBEDDING_DIMENSIONS:-1536}
      BYTECOACH_VECTOR_THRESHOLD: ${BYTECOACH_VECTOR_THRESHOLD:-0.3}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    image: ${BYTECOACH_FRONTEND_IMAGE:-ghcr.io/sreehc/bytecoach-frontend:latest}
    container_name: bytecoach-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${BYTECOACH_HTTP_BIND_HOST:-0.0.0.0}:${BYTECOACH_HTTP_PORT:-80}:80"
    networks:
      - bytecoach

volumes:
  redis_data:
    name: bytecoach_redis_data

networks:
  bytecoach:
    driver: bridge
