services:
  mysql:
    image: mysql:8.0
    container_name: bytecoach-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${BYTECOACH_DB_NAME:-bytecoach}
      MYSQL_USER: ${BYTECOACH_DB_USERNAME:-bytecoach}
      MYSQL_PASSWORD: ${BYTECOACH_DB_PASSWORD:?Set BYTECOACH_DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ../sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bytecoach

  redis:
    image: redis:7-alpine
    container_name: bytecoach-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${BYTECOACH_REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${BYTECOACH_REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bytecoach

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: bytecoach-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      BYTECOACH_DB_HOST: mysql
      BYTECOACH_DB_PORT: 3306
      BYTECOACH_DB_NAME: ${BYTECOACH_DB_NAME:-bytecoach}
      BYTECOACH_DB_USERNAME: ${BYTECOACH_DB_USERNAME:-bytecoach}
      BYTECOACH_DB_PASSWORD: ${BYTECOACH_DB_PASSWORD:?Set BYTECOACH_DB_PASSWORD}
      BYTECOACH_REDIS_HOST: redis
      BYTECOACH_REDIS_PORT: 6379
      BYTECOACH_REDIS_PASSWORD: ${BYTECOACH_REDIS_PASSWORD:-}
      BYTECOACH_JWT_SECRET: ${BYTECOACH_JWT_SECRET:?Set BYTECOACH_JWT_SECRET}
      BYTECOACH_CORS_ORIGINS: ${BYTECOACH_CORS_ORIGINS:-http://localhost}
      BYTECOACH_LLM_ENABLED: ${BYTECOACH_LLM_ENABLED:-true}
      BYTECOACH_LLM_BASE_URL: ${BYTECOACH_LLM_BASE_URL:-https://api.openai.com/v1}
      BYTECOACH_LLM_API_KEY: ${BYTECOACH_LLM_API_KEY:-}
      BYTECOACH_LLM_MODEL: ${BYTECOACH_LLM_MODEL:-gpt-4.1-mini}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - bytecoach

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: bytecoach-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${BYTECOACH_HTTP_PORT:-80}:80"
    networks:
      - bytecoach

volumes:
  mysql_data:
  redis_data:

networks:
  bytecoach:
    driver: bridge
