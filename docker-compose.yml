services:

  # ───────── MySQL ─────────
  mysql:
    image: mysql:8.0
    container_name: offerpilot-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${OFFERPILOT_DB_NAME:-offerpilot}
      MYSQL_USER: ${OFFERPILOT_DB_USERNAME:-offerpilot}
      MYSQL_PASSWORD: ${OFFERPILOT_DB_PASSWORD:?Set OFFERPILOT_DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./sql/initdata.sql:/docker-entrypoint-initdb.d/02-initdata.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - offerpilot

  # ───────── Redis ─────────
  redis:
    image: redis/redis-stack-server:latest
    container_name: offerpilot-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass ${OFFERPILOT_REDIS_PASSWORD:-}
      --loadmodule /opt/redis-stack/lib/redisearch.so
      --loadmodule /opt/redis-stack/lib/rejson.so
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${OFFERPILOT_REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - offerpilot

  # ───────── Backend ─────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: offerpilot-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # Database
      OFFERPILOT_DB_HOST: mysql
      OFFERPILOT_DB_PORT: 3306
      OFFERPILOT_DB_NAME: ${OFFERPILOT_DB_NAME:-offerpilot}
      OFFERPILOT_DB_USERNAME: ${OFFERPILOT_DB_USERNAME:-offerpilot}
      OFFERPILOT_DB_PASSWORD: ${OFFERPILOT_DB_PASSWORD:?Set OFFERPILOT_DB_PASSWORD}
      # Redis
      OFFERPILOT_REDIS_HOST: redis
      OFFERPILOT_REDIS_PORT: 6379
      OFFERPILOT_REDIS_PASSWORD: ${OFFERPILOT_REDIS_PASSWORD:-}
      # Security
      OFFERPILOT_JWT_SECRET: ${OFFERPILOT_JWT_SECRET:?Set OFFERPILOT_JWT_SECRET}
      OFFERPILOT_JWT_EXPIRE_SECONDS: ${OFFERPILOT_JWT_EXPIRE_SECONDS:-86400}
      OFFERPILOT_CORS_ORIGINS: ${OFFERPILOT_CORS_ORIGINS:-http://localhost}
      # LLM
      OFFERPILOT_LLM_ENABLED: ${OFFERPILOT_LLM_ENABLED:-true}
      OFFERPILOT_LLM_BASE_URL: ${OFFERPILOT_LLM_BASE_URL:-https://api.openai.com/v1}
      OFFERPILOT_LLM_API_KEY: ${OFFERPILOT_LLM_API_KEY:-}
      OFFERPILOT_LLM_MODEL: ${OFFERPILOT_LLM_MODEL:-gpt-4.1-mini}
      OFFERPILOT_LLM_TIMEOUT_SECONDS: ${OFFERPILOT_LLM_TIMEOUT_SECONDS:-30}
      # Embedding
      OFFERPILOT_EMBEDDING_ENABLED: ${OFFERPILOT_EMBEDDING_ENABLED:-false}
      OFFERPILOT_EMBEDDING_BASE_URL: ${OFFERPILOT_EMBEDDING_BASE_URL:-${OFFERPILOT_LLM_BASE_URL:-https://api.openai.com/v1}}
      OFFERPILOT_EMBEDDING_API_KEY: ${OFFERPILOT_EMBEDDING_API_KEY:-${OFFERPILOT_LLM_API_KEY:-}}
      OFFERPILOT_EMBEDDING_MODEL: ${OFFERPILOT_EMBEDDING_MODEL:-text-embedding-3-small}
      OFFERPILOT_EMBEDDING_DIMENSIONS: ${OFFERPILOT_EMBEDDING_DIMENSIONS:-1536}
      OFFERPILOT_VECTOR_THRESHOLD: ${OFFERPILOT_VECTOR_THRESHOLD:-0.3}
      # Business
      OFFERPILOT_WRONG_THRESHOLD: ${OFFERPILOT_WRONG_THRESHOLD:-60}
      OFFERPILOT_AI_QUOTA: ${OFFERPILOT_AI_QUOTA:-100}
      OFFERPILOT_RATE_LIMIT: ${OFFERPILOT_RATE_LIMIT:-60}
      OFFERPILOT_RATE_WINDOW: ${OFFERPILOT_RATE_WINDOW:-60}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - offerpilot

  # ───────── Frontend ─────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: offerpilot-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${OFFERPILOT_HTTP_PORT:-80}:80"
    networks:
      - offerpilot

volumes:
  mysql_data:
  redis_data:

networks:
  offerpilot:
    driver: bridge
